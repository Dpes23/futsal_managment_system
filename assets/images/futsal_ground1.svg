<svg width="400" height="250" viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="250" fill="#1a5f3f"/>
  
  <!-- Futsal Court -->
  <rect x="20" y="30" width="360" height="190" fill="#2d7a4e" stroke="white" stroke-width="3" rx="5"/>
  
  <!-- Center Line -->
  <line x1="200" y1="30" x2="200" y2="220" stroke="white" stroke-width="3"/>
  
  <!-- Center Circle -->
  <circle cx="200" cy="125" r="25" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="200" cy="125" r="5" fill="white"/>
  
  <!-- Left Penalty Area -->
  <rect x="20" y="75" width="60" height="100" fill="none" stroke="white" stroke-width="3"/>
  <rect x="20" y="95" width="30" height="60" fill="none" stroke="white" stroke-width="3"/>
  
  <!-- Right Penalty Area -->
  <rect x="320" y="75" width="60" height="100" fill="none" stroke="white" stroke-width="3"/>
  <rect x="350" y="95" width="30" height="60" fill="none" stroke="white" stroke-width="3"/>
  
  <!-- Left Goal -->
  <rect x="10" y="105" width="10" height="40" fill="white"/>
  
  <!-- Right Goal -->
  <rect x="380" y="105" width="10" height="40" fill="white"/>
  
  <!-- Corner Arcs -->
  <path d="M 20 35 Q 25 30 30 35" fill="none" stroke="white" stroke-width="2"/>
  <path d="M 370 35 Q 375 30 380 35" fill="none" stroke="white" stroke-width="2"/>
  <path d="M 20 215 Q 25 220 30 215" fill="none" stroke="white" stroke-width="2"/>
  <path d="M 370 215 Q 375 220 380 215" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Court Lines Texture -->
  <rect x="20" y="30" width="360" height="190" fill="url(#courtPattern)" opacity="0.1"/>
  
  <!-- Pattern Definition -->
  <defs>
    <pattern id="courtPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#2d7a4e"/>
      <line x1="0" y1="10" x2="20" y2="10" stroke="#3a8a5e" stroke-width="0.5"/>
      <line x1="10" y1="0" x2="10" y2="20" stroke="#3a8a5e" stroke-width="0.5"/>
    </pattern>
  </defs>
</svg>
