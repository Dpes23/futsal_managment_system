<svg width="400" height="250" viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Indoor Court Background -->
  <rect width="400" height="250" fill="#f5f5dc"/>
  
  <!-- Wooden Floor Pattern -->
  <rect width="400" height="250" fill="url(#woodPattern)"/>
  
  <!-- Futsal Court -->
  <rect x="20" y="30" width="360" height="190" fill="#d4a574" stroke="#8b4513" stroke-width="4" rx="5"/>
  
  <!-- Court Lines -->
  <line x1="200" y1="30" x2="200" y2="220" stroke="white" stroke-width="4"/>
  
  <!-- Center Circle -->
  <circle cx="200" cy="125" r="30" fill="none" stroke="white" stroke-width="4"/>
  <circle cx="200" cy="125" r="6" fill="white"/>
  
  <!-- Left Penalty Area -->
  <rect x="20" y="70" width="70" height="110" fill="none" stroke="white" stroke-width="4"/>
  <rect x="20" y="90" width="35" height="70" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Right Penalty Area -->
  <rect x="310" y="70" width="70" height="110" fill="none" stroke="white" stroke-width="4"/>
  <rect x="345" y="90" width="35" height="70" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Goals -->
  <rect x="8" y="100" width="12" height="50" fill="#ff6b35" stroke="#cc4125" stroke-width="2"/>
  <rect x="380" y="100" width="12" height="50" fill="#ff6b35" stroke="#cc4125" stroke-width="2"/>
  
  <!-- Corner Arcs -->
  <path d="M 20 35 Q 28 30 36 35" fill="none" stroke="white" stroke-width="3"/>
  <path d="M 364 35 Q 372 30 380 35" fill="none" stroke="white" stroke-width="3"/>
  <path d="M 20 215 Q 28 220 36 215" fill="none" stroke="white" stroke-width="3"/>
  <path d="M 364 215 Q 372 220 380 215" fill="none" stroke="white" stroke-width="3"/>
  
  <!-- Basketball Court Style 3-Point Lines (decorative) -->
  <path d="M 20 125 Q 60 80 100 125" fill="none" stroke="#8b4513" stroke-width="2" opacity="0.3"/>
  <path d="M 380 125 Q 340 80 300 125" fill="none" stroke="#8b4513" stroke-width="2" opacity="0.3"/>
  
  <!-- Wood Pattern Definition -->
  <defs>
    <pattern id="woodPattern" x="0" y="0" width="40" height="10" patternUnits="userSpaceOnUse">
      <rect width="40" height="10" fill="#d4a574"/>
      <rect y="0" width="40" height="2" fill="#c19660" opacity="0.5"/>
      <rect y="8" width="40" height="2" fill="#e5b885" opacity="0.5"/>
    </pattern>
  </defs>
</svg>
