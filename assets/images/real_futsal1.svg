<svg width="400" height="250" viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky and background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grassGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a7c59;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#5a8c69;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a6c49;stop-opacity:1" />
    </linearGradient>
    <pattern id="grassTexture" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#4a7c59"/>
      <circle cx="2" cy="2" r="0.5" fill="#5a8c69" opacity="0.6"/>
      <circle cx="6" cy="6" r="0.5" fill="#3a6c49" opacity="0.4"/>
      <circle cx="1" cy="5" r="0.3" fill="#6a9c79" opacity="0.5"/>
      <circle cx="5" cy="1" r="0.4" fill="#4a7c59" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background sky -->
  <rect width="400" height="250" fill="url(#skyGradient)"/>
  
  <!-- Ground area -->
  <rect y="160" width="400" height="90" fill="#8B7355"/>
  
  <!-- Main futsal court -->
  <rect x="25" y="35" width="350" height="125" fill="url(#grassGradient)" stroke="white" stroke-width="4" rx="3"/>
  <rect x="25" y="35" width="350" height="125" fill="url(#grassTexture)" opacity="0.7"/>
  
  <!-- Court lines -->
  <line x1="200" y1="35" x2="200" y2="160" stroke="white" stroke-width="4"/>
  
  <!-- Center circle -->
  <circle cx="200" cy="97.5" r="25" fill="none" stroke="white" stroke-width="4"/>
  <circle cx="200" cy="97.5" r="4" fill="white"/>
  
  <!-- Left penalty area -->
  <rect x="25" y="52.5" width="60" height="90" fill="none" stroke="white" stroke-width="4"/>
  <rect x="25" y="67.5" width="30" height="60" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Right penalty area -->
  <rect x="315" y="52.5" width="60" height="90" fill="none" stroke="white" stroke-width="4"/>
  <rect x="345" y="67.5" width="30" height="60" fill="none" stroke="white" stroke-width="4"/>
  
  <!-- Goals with realistic appearance -->
  <rect x="12" y="77.5" width="13" height="40" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  <rect x="375" y="77.5" width="13" height="40" fill="#ffffff" stroke="#cccccc" stroke-width="2"/>
  
  <!-- Goal net pattern -->
  <pattern id="netPattern" x="0" y="0" width="3" height="3" patternUnits="userSpaceOnUse">
    <rect width="3" height="3" fill="none" stroke="#888888" stroke-width="0.5"/>
  </pattern>
  <rect x="12" y="77.5" width="13" height="40" fill="url(#netPattern)" opacity="0.4"/>
  <rect x="375" y="77.5" width="13" height="40" fill="url(#netPattern)" opacity="0.4"/>
  
  <!-- Corner arcs -->
  <path d="M 25 40 Q 30 35 35 40" fill="none" stroke="white" stroke-width="3"/>
  <path d="M 365 40 Q 370 35 375 40" fill="none" stroke="white" stroke-width="3"/>
  <path d="M 25 155 Q 30 160 35 155" fill="none" stroke="white" stroke-width="3"/>
  <path d="M 365 155 Q 370 160 375 155" fill="none" stroke="white" stroke-width="3"/>
  
  <!-- Surrounding fence/wall -->
  <rect x="20" y="30" width="360" height="135" fill="none" stroke="#666666" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  
  <!-- Environmental details -->
  <circle cx="60" cy="25" r="12" fill="#FFD700" opacity="0.8"/>
  <circle cx="340" cy="20" r="10" fill="#FFD700" opacity="0.7"/>
  
  <!-- Shadows and lighting effects -->
  <ellipse cx="200" cy="165" rx="180" ry="8" fill="#000000" opacity="0.2"/>
  
  <!-- Court wear marks -->
  <ellipse cx="100" cy="97" rx="15" ry="8" fill="#3a6c49" opacity="0.3"/>
  <ellipse cx="300" cy="97" rx="15" ry="8" fill="#3a6c49" opacity="0.3"/>
</svg>
