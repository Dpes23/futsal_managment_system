<svg width="400" height="250" viewBox="0 0 400 250" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky Background -->
  <rect width="400" height="250" fill="#87CEEB"/>
  
  <!-- Ground -->
  <rect y="180" width="400" height="70" fill="#8B7355"/>
  
  <!-- Futsal Court Surface -->
  <rect x="30" y="40" width="340" height="140" fill="#4a7c59" stroke="white" stroke-width="3" rx="8"/>
  
  <!-- Court Lines -->
  <line x1="200" y1="40" x2="200" y2="180" stroke="white" stroke-width="3"/>
  
  <!-- Center Circle -->
  <circle cx="200" cy="110" r="28" fill="none" stroke="white" stroke-width="3"/>
  <circle cx="200" cy="110" r="5" fill="white"/>
  
  <!-- Left Penalty Area -->
  <rect x="30" y="60" width="65" height="100" fill="none" stroke="white" stroke-width="3"/>
  <rect x="30" y="80" width="32" height="60" fill="none" stroke="white" stroke-width="3"/>
  
  <!-- Right Penalty Area -->
  <rect x="305" y="60" width="65" height="100" fill="none" stroke="white" stroke-width="3"/>
  <rect x="338" y="80" width="32" height="60" fill="none" stroke="white" stroke-width="3"/>
  
  <!-- Goals -->
  <rect x="18" y="90" width="12" height="40" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  <rect x="370" y="90" width="12" height="40" fill="#ffffff" stroke="#cccccc" stroke-width="1"/>
  
  <!-- Goal Nets -->
  <pattern id="netPattern" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="4" fill="none" stroke="#666" stroke-width="0.5"/>
  </pattern>
  <rect x="18" y="90" width="12" height="40" fill="url(#netPattern)" opacity="0.3"/>
  <rect x="370" y="90" width="12" height="40" fill="url(#netPattern)" opacity="0.3"/>
  
  <!-- Corner Arcs -->
  <path d="M 30 45 Q 36 40 42 45" fill="none" stroke="white" stroke-width="2"/>
  <path d="M 358 45 Q 364 40 370 45" fill="none" stroke="white" stroke-width="2"/>
  <path d="M 30 175 Q 36 180 42 175" fill="none" stroke="white" stroke-width="2"/>
  <path d="M 358 175 Q 364 180 370 175" fill="none" stroke="white" stroke-width="2"/>
  
  <!-- Surrounding Area -->
  <rect x="25" y="35" width="350" height="150" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  
  <!-- Court Surface Texture -->
  <rect x="30" y="40" width="340" height="140" fill="url(#grassTexture)" opacity="0.2"/>
  
  <!-- Background Elements -->
  <circle cx="50" cy="30" r="15" fill="#FFD700" opacity="0.8"/>
  <circle cx="350" cy="25" r="12" fill="#FFD700" opacity="0.7"/>
  
  <!-- Grass Texture Pattern -->
  <defs>
    <pattern id="grassTexture" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse">
      <rect width="15" height="15" fill="#4a7c59"/>
      <line x1="0" y1="7" x2="15" y2="7" stroke="#5a8c69" stroke-width="0.5"/>
      <line x1="7" y1="0" x2="7" y2="15" stroke="#5a8c69" stroke-width="0.5"/>
    </pattern>
  </defs>
</svg>
